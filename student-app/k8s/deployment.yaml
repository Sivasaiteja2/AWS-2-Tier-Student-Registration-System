apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-backend
  namespace: flask-app
spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-backend

  template:
    metadata:
      labels:
        app: flask-backend

    spec:
      containers:
      - name: flask-backend

        image: saiteja2010234/2tier:latest

        ports:
        - containerPort: 5000

        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: flask-secret
              key: DB_HOST

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: flask-secret
              key: DB_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: flask-secret
              key: DB_PASSWORD

        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: flask-secret
              key: DB_NAME
